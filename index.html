<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 WFD 阶梯式全屏背诵系统</title>
  <style>
    /* 全屏响应式基础样式 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 40px 20px;
      color: #2d3748;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 900px; /* 极大地加宽了容器，非常适合大屏和全屏使用 */
      background: #ffffff;
      border-radius: 16px;
      padding: 35px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      height: fit-content;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      border-bottom: 2px solid #edf2f7;
      padding-bottom: 15px;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #1a202c;
    }
    .btn-refresh {
      background-color: #4a5568;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-refresh:hover { background-color: #2d3748; }
    
    /* 线索数据行 */
    .info-row {
      margin-bottom: 18px;
      line-height: 1.6;
      font-size: 16px;
      display: flex;
      align-items: flex-start;
    }
    .label {
      font-weight: bold;
      color: #1a202c;
      flex-shrink: 0;
      width: 110px;
    }
    .content-box {
      flex-grow: 1;
    }
    .code-tag {
      background-color: #edf2f7;
      color: #4a5568;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: SFMono-Regular, Consolas, monospace;
      font-size: 15px;
      word-break: break-all;
      display: inline-block;
    }
    .translation-box {
      font-size: 16px;
      color: #2d3748;
      background-color: #f7fafc;
      padding: 10px 16px;
      border-radius: 6px;
      border-left: 4px solid #4a5568;
      line-height: 1.6;
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
    }
    
    /* 核心互动练习区（App式大输入框） */
    .practice-zone {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      margin-top: 25px;
    }
    .step-title {
      font-size: 16px;
      font-weight: bold;
      color: #2b6cb0;
      margin-bottom: 15px;
    }
    .input-area {
      width: 100%;
      height: 100px; /* 加高了输入框，打字极度舒适 */
      padding: 15px;
      box-sizing: border-box;
      border: 2px solid #cbd5e0;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area:focus {
      border-color: #3182ce;
      box-shadow: 0 0 0 4px rgba(66, 153, 225, 0.15);
    }
    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
    }
    .feedback-msg {
      font-size: 15px;
      font-weight: bold;
      max-width: 550px;
      line-height: 1.4;
    }
    .msg-error { color: #e53e3e; }
    .msg-success { color: #38a169; }
    
    .btn-submit {
      background-color: #3182ce;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn-submit:hover { background-color: #2b6cb0; }
    
    /* 对账单样式 */
    .result-box {
      background-color: #fff;
      border: 1px solid #e2e8f0;
      padding: 16px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 15.5px;
      line-height: 1.6;
    }
    
    .divider {
      border-top: 1px dashed #e2e8f0;
      margin: 25px 0;
    }
    .points-title {
      font-size: 18px;
      font-weight: bold;
      color: #2d3748;
      margin-bottom: 12px;
    }
    .points-list {
      margin: 0;
      padding-left: 20px;
      font-size: 15.5px;
      line-height: 1.7;
      color: #4a5568;
    }
    .points-list li { margin-bottom: 10px; }
    .points-list b { color: #e53e3e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title" id="title-text">🎯 WFD 核心真题随身刷</div>
      <div style="display: flex; gap: 10px;">
        <button class="btn-refresh" id="skip-btn" style="background-color: #718096;">跳过此题 ➔</button>
        <button class="btn-refresh" id="next-btn" style="display: none;">下一句 ➔</button>
      </div>
    </div>
    
    <div id="hint-section">
      <div class="info-row" id="row-main">
        <span class="label">○ 主干：</span>
        <div class="content-box">
          <span class="code-tag" id="main-stem"></span>
          <span id="main-stem-cn"></span>
        </div>
      </div>
      
      <div class="info-row" id="row-details">
        <span class="label">○ 细节：</span>
        <div class="content-box">
          <span class="code-tag" id="details"></span>
          <span id="details-cn"></span>
        </div>
      </div>
      
      <div class="info-row" id="row-english">
        <span class="label">○ 完整英文：</span>
        <div class="content-box">
          <div class="code-tag" id="full-english" style="line-height: 1.5;"></div>
        </div>
      </div>
    </div>
    
    <div class="info-row" id="row-translation">
      <span class="label">○ 完整中文：</span>
      <div class="content-box">
        <div class="translation-box" id="full-translation"></div>
      </div>
    </div>
    
    <div class="practice-zone">
      <div class="step-title" id="step-indicator">阶段一：请照抄一遍上方完整英文句</div>
      <textarea class="input-area" id="user-input" placeholder="请在这里输入或默写句子，注意标点与大小写..."></textarea>
      
      <div class="action-bar">
        <div class="feedback-msg" id="feedback"></div>
        <button class="btn-submit" id="submit-btn">提交验证</button>
      </div>
      
      <div id="check-result-zone" style="display: none;">
        <div style="font-weight: bold; font-size: 14px; margin-top: 12px; color: #4a5568;">🔍 默写对账单：</div>
        <div class="result-box">
          <div style="color: #e53e3e;"><b>你的默写：</b><span id="res-user"></span></div>
          <div style="color: #38a169; margin-top: 8px;"><b>标准答案：</b><span id="res-target"></span></div>
        </div>
      </div>
    </div>
    
    <div id="review-section" style="display: none;">
      <div class="divider"></div>
      <div class="points-title">💡 考点剧透：</div>
      <ul class="points-list" id="test-points"></ul>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
